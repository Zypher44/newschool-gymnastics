{% extends "base.html" %}

{% block title %}Create Team Event{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Create Team Event</h1>

    <a href="{% url 'coach_dashboard' %}" class="btn btn-secondary">
        ← Back to Dashboard
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Event Title</label>
                <input
                    type="text"
                    name="title"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Date</label>
                <input
                    type="date"
                    name="event_date"
                    class="form-control"
                    required
                >
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Start Time</label>
                    <input
                        type="time"
                        name="start_time"
                        class="form-control"
                    >
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">End Time</label>
                    <input
                        type="time"
                        name="end_time"
                        class="form-control"
                    >
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input
                    type="text"
                    name="location"
                    class="form-control"
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                    name="description"
                    rows="5"
                    class="form-control"
                ></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Save Event
            </button>
        </form>
    </div>
</div>

{% endblock %}
