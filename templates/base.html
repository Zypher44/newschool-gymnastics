<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}NewSchool Gymnastics{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">NewSchool Gymnastics</a>

        <div class="navbar-nav">
            {% if user.is_authenticated %}
                {% if user.role == 'coach' or user.role == 'head_coach' %}
                    <a class="nav-link" href="{% url 'coach_dashboard' %}">Coach Dashboard</a>
                    <a class="nav-link" href="{% url 'add_event' %}">Add Event</a>
                {% elif user.role == 'athlete' %}
                    <a class="nav-link" href="{% url 'submit_survey' %}">Daily Survey</a>
                {% endif %}
            {% endif %}
        </div>
    </div>
</nav>

<main class="container mb-5">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
